<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macedo Palestras & Consultoria | Eficiência Comercial e Governança de TI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f5f5f7;
            line-height: 1.6;
        }

        /* Cabeçalho Corporativo */
        header {
            background-color: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .brand span {
            color: #86868b;
            font-weight: 400;
        }

        nav a {
            color: #86868b;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* Seção Hero - Impacto Máximo */
        .hero {
            max-width: 1000px;
            margin: 180px auto 100px auto;
            text-align: center;
            padding: 0 20px;
        }

        .hero .tagline {
            display: inline-block;
            background: rgba(0, 113, 227, 0.15);
            color: #0071e3;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 24px;
            color: #ffffff;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.4rem;
            color: #86868b;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            background-color: #0071e3;
            color: #ffffff;
            padding: 14px 32px;
            border-radius: 980px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1.05rem;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.4);
        }

        .cta-button:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
        }

        /* Seção Metodologia Tripla (Ouvir, Pensar, Agir) */
        .method-section {
            max-width: 1200px;
            margin: 0 auto 90px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .method-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
        }

        .method-box .num {
            font-size: 0.85rem;
            color: #0071e3;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
        }

        .method-box h3 {
            font-size: 1.4rem;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        /* Seção de Serviços Estruturada */
        .services-section {
            background-color: #121724;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 90px 20px;
        }

        .section-title {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 60px auto;
        }

        .section-title h2 {
            font-size: 2.2rem;
            color: #ffffff;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .section-title p {
            color: #86868b;
            font-size: 1.1rem;
        }

        .services-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #1c2333;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 45px;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 113, 227, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card .icon-wrapper {
            width: 48px;
            height: 48px;
            background: rgba(0, 113, 227, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: #0071e3;
            font-size: 1.4rem;
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .card p {
            color: #a1a1a6;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .card .frameworks {
            font-size: 0.85rem;
            color: #86868b;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 15px;
            margin-top: 15px;
        }

        .card .frameworks strong {
            color: #ffffff;
        }

        /* Seção Biográfica Executiva
